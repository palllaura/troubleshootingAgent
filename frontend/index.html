<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troubleshooting Agent</title>

    <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>

<div class="chat-container">

    <div class="messages" id="messages">
        <!-- Chat messages will appear here -->
    </div>

    <div class="user-input">
        <label for="userInput">userInput</label><input
                type="text"
                id="userInput"
                placeholder="Describe your problem..."
        />

        <button onclick="sendMessage()">
            Send
        </button>
    </div>

    <div class="quick-replies">
        <button onclick="quickReply('What is your name?')">
            What is your name?
        </button>

        <button onclick="quickReply('Hello')">
            Hello
        </button>

        <button onclick="quickReply('Goodbye')">
            Goodbye
        </button>
    </div>

</div>

<script src="/frontend/chatbot.js"></script>

</body>
</html>
